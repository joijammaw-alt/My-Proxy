server {
    listen 80;
    server_name web.blayblay.com;

    # 1. ถ้ามีคนเข้า /home -> ส่งไปแอปหลัก (พอร์ต 8081)
    location /home {
        proxy_pass http://192.168.1.164:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. ถ้ามีคนเข้า /brewlean -> ส่งไปแอป Brewlean (พอร์ต 8082)
    location /brewlean {
        proxy_pass http://192.168.1.164:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. ถ้ามีคนเข้า /playlab -> ส่งไปแอป Playlab (พอร์ต 8083)
    location /playlab {
        proxy_pass http://192.168.1.164:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # (เพิ่มเติม) ทริคพิเศษ: ถ้าคนพิมพ์แค่ web.blayblay.com เฉยๆ ให้เด้งไปหน้า /home อัตโนมัติ
    location = / {
        return 301 /home;
    }
}